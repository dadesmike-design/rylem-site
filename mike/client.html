<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Account — Rylem</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--surface:#111;--surface2:#1a1a1a;--surface3:#222;
  --border:#2a2a2a;--border-hover:#3a3a3a;
  --text:#f0f0f0;--text2:#888;--text3:#555;
  --neon-green:#39ff14;--neon-cyan:#00e5ff;--neon-purple:#bf5af2;
  --neon-pink:#ff2d78;--neon-orange:#ff2d55;--neon-amber:#a855f7;
  --neon-blue:#2979ff;--neon-red:#ff1744;--neon-yellow:#eeff41;
  --neon-lime:#76ff03;
  --rep-mike:#00e5ff;--rep-julia:#bf5af2;--rep-april:#ff2d78;--rep-liza:#a855f7;--rep-open:#888;
  --radius:14px;--radius-sm:8px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
a{color:var(--neon-cyan);text-decoration:none}a:hover{text-decoration:underline}
button,input,select,textarea{font-family:inherit}

/* LOGOUT */
.btn-logout{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-logout:hover{border-color:var(--neon-red);color:var(--neon-red);background:rgba(255,23,68,.08)}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:14px;padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.back-btn{font-size:13px;color:var(--neon-cyan);cursor:pointer;padding:6px 14px;border:1px solid rgba(0,229,255,.25);border-radius:var(--radius-sm);background:rgba(0,229,255,.06);transition:.15s;text-decoration:none}
.back-btn:hover{background:rgba(0,229,255,.15);text-decoration:none}
.topbar-fill{flex:1}

/* PAGE */
.page{max-width:980px;margin:0 auto;padding:28px 24px 80px}

/* HEADER CARD */
.hdr{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
.hdr-top{display:flex;align-items:center;gap:18px;margin-bottom:14px}
.hdr-avatar{width:56px;height:56px;border-radius:14px;background:var(--surface2);border:2px solid var(--neon-purple);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:var(--neon-purple);flex-shrink:0}
.hdr-name{font-size:28px;font-weight:800;line-height:1.1}
.hdr-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:0}
.pill{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}
.pill-status{border-color:rgba(57,255,20,.3);background:rgba(57,255,20,.08);color:var(--neon-green)}
.pill-status.active{border-color:rgba(57,255,20,.3);background:rgba(57,255,20,.08);color:var(--neon-green)}
.pill-status.prospecting{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.08);color:var(--neon-amber)}
.pill-status.researching{border-color:rgba(41,121,255,.3);background:rgba(41,121,255,.08);color:var(--neon-blue)}
.pill-status.won{border-color:rgba(57,255,20,.3);background:rgba(57,255,20,.08);color:var(--neon-green)}
.pill-status.lost{border-color:rgba(255,23,68,.3);background:rgba(255,23,68,.08);color:var(--neon-red)}
.pill-status.churned{border-color:rgba(255,23,68,.3);background:rgba(255,23,68,.08);color:var(--neon-red)}
.pill-city{border-color:var(--border);background:var(--surface2);color:var(--text2)}
.pill-domain{border-color:var(--border);background:var(--surface2);color:var(--neon-cyan)}
.pill-domain a{color:var(--neon-cyan);text-decoration:none}.pill-domain a:hover{text-decoration:underline}

/* REP SWITCHER */
.rep-pill{position:relative;cursor:pointer;user-select:none;border-color:var(--border);background:var(--surface2)}
.rep-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rep-dd{position:absolute;top:calc(100% + 6px);left:0;min-width:160px;background:var(--surface);border:1px solid var(--border-hover);border-radius:var(--radius-sm);overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.6);display:none;z-index:300}
.rep-dd.open{display:block}
.rep-opt{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.1s}
.rep-opt:hover{background:var(--surface2)}

/* SIGNAL BAR */
.signal-bar{border-left:3px solid var(--neon-amber);background:rgba(13,0,26,.6);padding:12px 18px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:13px;color:var(--neon-amber);margin-top:14px}
.signal-bar strong{color:var(--text)}

/* ALERT BAR */
.alert-bar{border:1px solid;border-radius:var(--radius-sm);padding:14px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600}
.alert-bar.good{border-color:rgba(57,255,20,.25);background:rgba(57,255,20,.06);color:var(--neon-green)}
.alert-bar.warn{border-color:rgba(255,45,85,.25);background:rgba(26,0,16,.6);color:var(--neon-orange)}
.alert-bar.danger{border-color:rgba(255,45,120,.25);background:rgba(255,45,120,.06);color:var(--neon-pink)}
.alert-action{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid currentColor;background:transparent;color:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.alert-action:hover{filter:brightness(1.3)}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.m-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.m-card.clickable{cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s}
.m-card.clickable:hover{border-color:rgba(0,212,255,.35);background:rgba(0,212,255,.04);box-shadow:0 0 12px rgba(0,212,255,.08)}
.m-val{font-size:36px;font-weight:800;line-height:1}
.m-label{font-size:11px;color:var(--text3);margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.m-good{color:var(--neon-green)}.m-warn{color:var(--neon-orange)}.m-danger{color:var(--neon-pink)}.m-info{color:var(--neon-cyan)}.m-purple{color:var(--neon-purple)}

/* SECTIONS */
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.sec-hd{display:flex;align-items:center;gap:10px;padding:16px 20px;cursor:pointer;user-select:none;transition:.1s}
.sec-hd:hover{background:var(--surface2)}
.sec-hd.no-collapse{cursor:default}.sec-hd.no-collapse:hover{background:transparent}
.sec-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;flex:1}
.sec-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.sec-hd.open .chevron{transform:rotate(180deg)}
.sec-body{display:none;padding:0 20px 20px}
.sec-body.open{display:block}
.sec-body.default-open{display:block}

/* CONTACTS */
.ct-header{display:grid;grid-template-columns:40px 1.2fr 1.2fr auto auto auto auto;gap:10px;padding:8px 0;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.ct-row{position:relative;display:grid;grid-template-columns:40px 1.2fr 1.2fr auto auto auto auto auto;gap:10px;align-items:center;padding:11px 0;border-bottom:1px solid rgba(42,42,42,.5);transition:.1s;font-size:13px}
.ct-row:last-child{border-bottom:none}
.ct-row:hover{background:rgba(255,255,255,.02);border-radius:var(--radius-sm)}
.badge-history{display:inline-block;font-size:9px;font-weight:700;color:#00cfff;background:rgba(0,207,255,.1);border:1px solid rgba(0,207,255,.25);padding:1px 5px;border-radius:3px;margin-left:6px;cursor:pointer;vertical-align:middle;letter-spacing:.3px}
.history-tooltip{display:none;font-size:12px;color:#bbb;line-height:1.5;padding:8px 0 0;grid-column:2/span 6}
.ct-avatar{width:34px;height:34px;border-radius:10px;background:rgba(191,90,242,.12);border:1px solid rgba(191,90,242,.25);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--neon-purple)}
.ct-name{font-weight:600}.ct-title{color:var(--text2)}
.ct-step{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.ct-step.active{border-color:rgba(0,229,255,.3);color:var(--neon-cyan);background:rgba(0,229,255,.08)}
.ct-li a{color:var(--neon-blue);font-size:16px;text-decoration:none;transition:.1s}.ct-li a:hover{filter:brightness(1.4)}
.ct-li .no-li{color:var(--text3);font-size:13px}
.ct-warn{padding:12px 16px;background:rgba(0,26,26,.6);border:1px solid rgba(0,207,255,.15);border-radius:var(--radius-sm);font-size:12px;color:#00cfff;margin-top:12px}
.ct-add{margin-top:12px;padding:8px 16px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;width:100%}
.ct-add:hover{border-color:var(--neon-cyan);color:var(--neon-cyan)}

/* MEETINGS SECTION */
.meetings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.meetings-hd{display:flex;align-items:center;gap:8px;padding:14px 20px;cursor:pointer;user-select:none}
.meetings-hd:hover{background:var(--surface2)}
.meetings-chevron{font-size:10px;color:var(--text3);transition:transform .2s}
.meetings-chevron.open{transform:rotate(90deg)}
.meetings-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.meetings-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;background:rgba(57,255,20,.1);color:var(--neon-green)}
.meetings-body{padding:0 20px 16px;display:none}
.meetings-body.open{display:block}
.mtg-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.mtg-row:last-child{border-bottom:none}
.mtg-date{font-size:12px;font-weight:700;color:var(--text);min-width:80px}
.mtg-time{font-size:11px;color:var(--text3);min-width:55px}
.mtg-type{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px}
.mtg-type.virtual{background:rgba(0,229,255,.1);color:var(--neon-cyan)}
.mtg-type.in_person{background:rgba(191,90,247,.1);color:var(--neon-purple)}
.mtg-outcome{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.mtg-outcome.positive{background:rgba(57,255,20,.1);color:var(--neon-green)}
.mtg-outcome.neutral{background:rgba(0,229,255,.1);color:var(--neon-cyan)}
.mtg-outcome.not_interested{background:rgba(255,45,120,.1);color:var(--neon-pink)}
.mtg-outcome.follow_up_scheduled{background:rgba(168,85,247,.1);color:var(--neon-amber)}
.mtg-outcome.scheduled{background:rgba(255,255,255,.06);color:var(--text3)}
.mtg-contact{font-size:12px;color:var(--text2);min-width:100px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtg-notes{font-size:12px;color:var(--text3);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtg-complete-btn{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid rgba(57,255,20,.3);background:rgba(57,255,20,.08);color:var(--neon-green);transition:.15s;white-space:nowrap}
.mtg-complete-btn:hover{background:rgba(57,255,20,.18);border-color:var(--neon-green)}

/* MEETING COMPLETE MODAL */
.mtg-modal-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.mtg-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;width:520px;max-width:94vw;max-height:90vh;overflow-y:auto}
.mtg-modal h2{font-size:20px;font-weight:800;margin-bottom:4px}
.mtg-modal .sub{font-size:13px;color:var(--text2);margin-bottom:20px}
.mtg-field{margin-bottom:14px}
.mtg-field label{display:block;font-size:12px;font-weight:700;color:var(--neon-cyan);margin-bottom:6px}
.mtg-field input,.mtg-field textarea{width:100%;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.mtg-field input:focus,.mtg-field textarea:focus{border-color:var(--neon-purple)}
.mtg-field textarea{min-height:100px;resize:vertical;line-height:1.5}
.mtg-outcome-row{display:flex;gap:8px;flex-wrap:wrap}
.mtg-outcome-btn{flex:1;min-width:100px;padding:10px 8px;text-align:center;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text3);transition:all .15s}
.mtg-outcome-btn.active{border-color:var(--neon-green);background:rgba(57,255,20,.1);color:var(--neon-green)}
.mtg-outcome-btn[data-val=neutral].active{border-color:var(--neon-cyan);background:rgba(0,229,255,.1);color:var(--neon-cyan)}
.mtg-outcome-btn[data-val=not_interested].active{border-color:var(--neon-pink);background:rgba(255,45,120,.1);color:var(--neon-pink)}
.mtg-outcome-btn[data-val=follow_up_scheduled].active{border-color:var(--neon-amber);background:rgba(168,85,247,.1);color:var(--neon-amber)}
.mtg-submit{width:100%;padding:12px;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;border:none;background:var(--neon-green);color:#000;margin-top:16px}
.mtg-submit:disabled{opacity:.5;cursor:not-allowed}
.mtg-cancel{width:100%;padding:10px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text3);margin-top:8px}
.mtg-cancel:hover{border-color:var(--text3);color:var(--text)}

/* AI SUMMARY */
.ai-text{font-size:14px;line-height:1.8;color:var(--text)}
.ai-loading{color:var(--text3);font-style:italic}
.ai-refresh{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid rgba(0,229,255,.25);background:rgba(0,229,255,.06);color:var(--neon-cyan);font-size:11px;font-weight:700;cursor:pointer;transition:.15s}
.ai-refresh:hover{background:rgba(0,229,255,.15)}

/* ACTIVITY */
.act-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(42,42,42,.4);font-size:13px;align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.act-dot.linkedin,.act-dot.lead_added{background:var(--neon-blue)}
.act-dot.email,.act-dot.sequence_advanced{background:var(--neon-purple)}
.act-dot.call,.act-dot.task_completed{background:var(--neon-green)}
.act-dot.note{background:var(--neon-purple)}
.act-dot.default{background:var(--text3)}
.act-time{color:var(--text3);font-size:11px;min-width:90px;flex-shrink:0}
.act-desc{color:var(--text2);flex:1}

/* NOTES */
.notes-area{width:100%;min-height:130px;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:14px;font-family:inherit;resize:vertical;outline:none;line-height:1.6}
.notes-area:focus{border-color:var(--neon-cyan)}
.notes-status{font-size:12px;color:var(--text3);margin-top:6px;min-height:18px}

/* LOADING */
.page-loading{text-align:center;padding:120px 20px;color:var(--text3)}.page-loading .spin{font-size:40px;margin-bottom:12px}

@media(max-width:700px){
  .metrics{grid-template-columns:repeat(2,1fr)}
  .ct-row,.ct-header{grid-template-columns:34px 1fr 1fr auto auto}
  .ct-step,.ct-li{display:none}
  .hdr-top{flex-direction:column;align-items:flex-start}
}
.cedit-row{animation:fadeSlide .2s ease}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="topbar" id="topbar" style="display:none">
  <a class="back-btn" href="bdm.html">← Dashboard</a>
  <div class="topbar-fill"></div>
  <button class="btn-logout" onclick="doLogout()">Sign Out</button>
</header>

<div class="page" id="page" style="display:none">
  <div id="dnc-banner" style="display:none;background:#ff1744;color:#fff;text-align:center;padding:12px 20px;font-weight:700;font-size:14px;border-radius:var(--radius);margin-bottom:12px;letter-spacing:.5px">🚫 DO NOT CONTACT — This account is hands off</div>
  <div class="hdr" id="hdr-card"></div>
  <div id="alert-slot"></div>
  <div class="metrics" id="metrics"></div>

  <!-- CONTACTS -->
  <div class="section" id="sec-contacts">
    <div class="sec-hd" onclick="toggleSec('contacts')">
      <span class="chevron" id="chev-contacts">▼</span>
      <span class="sec-title">Contacts</span>
      <span class="sec-badge" id="ct-badge" style="background:rgba(0,229,255,.1);color:var(--neon-cyan)">0</span>
    </div>
    <div style="padding:8px 16px;">
      <input id="contact-search" type="text" placeholder="Search contacts..." oninput="filterAll(this.value)" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(0,229,255,0.2);border-radius:8px;color:#fff;font-size:14px;outline:none;" />
    </div>
    <div class="sec-body" id="body-contacts"></div>
  </div>

  <!-- AI SUMMARY -->
  <div class="section">
    <div class="sec-hd no-collapse">
      <span class="sec-title">AI Summary</span>
      <button class="ai-refresh" onclick="generateSummary()">🔄 Refresh</button>
    </div>
    <div class="sec-body default-open" id="body-ai"><span class="ai-loading">Generating…</span></div>
  </div>

  <!-- ACTIVITY -->
  <div class="section" id="sec-activity">
    <div class="sec-hd" onclick="toggleSec('activity')">
      <span class="chevron" id="chev-activity">▼</span>
      <span class="sec-title">Activity</span>
      <span class="sec-badge" id="act-badge" style="background:rgba(191,90,242,.1);color:var(--neon-purple)">0</span>
    </div>
    <div class="sec-body" id="body-activity"></div>
  </div>

  <!-- MEETINGS -->
  <div class="meetings-card" id="meetings-card" style="display:none">
    <div class="meetings-hd" onclick="toggleMeetings()">
      <span class="meetings-chevron" id="mtg-chev">▶</span>
      <span class="meetings-title">Meetings</span>
      <span class="meetings-badge" id="mtg-badge">0</span>
    </div>
    <div class="meetings-body" id="mtg-body"></div>
  </div>

  <!-- NOTES -->
  <div class="section">
    <div class="sec-hd no-collapse">
      <span class="sec-title">Notes</span>
    </div>
    <div class="sec-body default-open">
      <textarea class="notes-area" id="notes-area" placeholder="Add notes about this account…"></textarea>
      <div class="notes-status" id="notes-status"></div>
    </div>
  </div>
</div>

<div class="page-loading" id="page-loading" style="display:none"><div class="spin">⏳</div><p>Loading account…</p></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth-check.js"></script>
<script>
const db = window.rylemDb;

// Boot via auth
window.rylemAuthReady.then(function() { boot(); });

const REP_COLORS={mike:'var(--rep-mike)',julia:'var(--rep-julia)',april:'var(--rep-april)',liza:'var(--rep-liza)',open:'var(--rep-open)'};
const REP_NAMES={mike:'Mike Dades',julia:'Julia Dusseau',april:'April Melton',liza:'Liza Valencia',open:'Unassigned'};

let account=null,contacts=[],sequences=[],activity=[],accountMeetings=[];

async function boot(){
  const id=new URLSearchParams(location.search).get('id');
  if(!id){showError('No account ID.');return;}
  document.getElementById('page-loading').style.display='block';

  const [{data:acc,error:ae},{data:cts},{data:seqs},{data:acts},{data:mtgs}] = await Promise.all([
    db.from('accounts').select('*').eq('id',id).single(),
    db.from('contacts').select('*').eq('account_id',id).order('created_at'),
    db.from('sequences').select('*').eq('account_id',id),
    db.from('activity_log').select('*').eq('account_id',id).order('created_at',{ascending:false}).limit(50),
    db.from('meetings').select('*').eq('account_id',id).order('meeting_date',{ascending:false})
  ]);
  if(ae||!acc){showError('Account not found.');return;}
  account=acc; contacts=cts||[]; sequences=seqs||[]; activity=acts||[]; accountMeetings=mtgs||[];

  document.getElementById('page-loading').style.display='none';
  document.getElementById('topbar').style.display='flex';
  document.getElementById('page').style.display='block';
  document.title=account.company+' — Rylem';

  renderHeader();
  renderDNCBanner();
  renderAlert();
  renderMetrics();
  renderContacts();
  renderActivity();
  renderMeetings();
  renderNotes();
  generateSummary();
}

// ─── ALERT ───
function renderAlert(){
  const el=document.getElementById('alert-slot');
  const engaged=contacts.filter(c=>c.status&&c.status!=='new').length;
  const meetingSet=contacts.filter(c=>c.status==='meeting_set').length;
  const daysSinceCreated=Math.floor((Date.now()-new Date(account.created_at).getTime())/86400000);

  if(meetingSet>0){
    el.innerHTML=`<div class="alert-bar good">🎯 Meeting set with ${meetingSet} contact${meetingSet>1?'s':''}. Keep momentum — prep the brief.<button class="alert-action" onclick="toggleSec('contacts')">View Contacts</button></div>`;
  } else if(engaged===0 && contacts.length>0 && daysSinceCreated>=14){
    el.innerHTML=`<div class="alert-bar danger">🚨 ${contacts.length} contacts loaded, zero engaged after ${daysSinceCreated} days. Outreach stalled.<button class="alert-action" onclick="toggleSec('contacts')">Check Contacts</button></div>`;
  } else if(engaged===0 && contacts.length>0){
    el.innerHTML=`<div class="alert-bar warn">⚠️ ${contacts.length} contacts loaded but none engaged yet. Start outreach.<button class="alert-action" onclick="toggleSec('contacts')">View Contacts</button></div>`;
  } else if(contacts.length===0){
    el.innerHTML=`<div class="alert-bar warn">⚠️ No contacts loaded. Add decision makers to start outreach.<button class="alert-action" onclick="toggleSec('contacts')">Add Contact</button></div>`;
  } else if(daysSinceCreated>=14 && meetingSet===0){
    el.innerHTML=`<div class="alert-bar danger">🚨 ${daysSinceCreated} days in pipeline, no meeting set. Escalate or reassess.<button class="alert-action" onclick="toggleSec('activity')">View Activity</button></div>`;
  } else {
    el.innerHTML='';
  }
}

// ─── JUMP TO CONTACTS FROM METRIC CARDS ───
function jumpToContacts(filter){
  // Expand the contacts section if collapsed
  const body=document.getElementById('body-contacts');
  const chev=document.getElementById('chev-contacts');
  const hd=chev?.closest('.sec-hd');
  if(body && !body.classList.contains('open')){
    body.classList.add('open');
    if(hd) hd.classList.add('open');
  }

  // Build set of sequenced contact IDs
  const seqContactIds=new Set(sequences.filter(s=>s.status==='active').map(s=>s.contact_id));

  // Highlight/dim rows
  const rows=body?.querySelectorAll('.ct-row')||[];
  rows.forEach(row=>{
    row.style.transition='opacity .25s, box-shadow .25s';
    row.style.opacity='';
    row.style.boxShadow='';
  });

  if(filter==='sequenced' && seqContactIds.size>0){
    // Match rows to contacts by index
    contacts.forEach((c,i)=>{
      if(rows[i]){
        if(seqContactIds.has(c.id)){
          rows[i].style.opacity='1';
          rows[i].style.boxShadow='inset 0 0 0 1px rgba(0,212,255,.3)';
        } else {
          rows[i].style.opacity='0.3';
        }
      }
    });
    // Clear highlighting after 5 seconds
    setTimeout(()=>{
      rows.forEach(row=>{row.style.opacity='';row.style.boxShadow='';});
    },5000);
  }

  // Scroll to contacts section
  document.getElementById('sec-contacts')?.scrollIntoView({behavior:'smooth',block:'start'});
}

function scrollToMeetings(){
  const card=document.getElementById('meetings-card');
  if(!card||card.style.display==='none')return;
  // Expand if collapsed
  const body=document.getElementById('mtg-body');
  const chev=document.getElementById('mtg-chev');
  if(body&&!body.classList.contains('open')){
    body.classList.add('open');
    if(chev)chev.classList.add('open');
  }
  card.scrollIntoView({behavior:'smooth',block:'start'});
}

// ─── MEETINGS ───
let _completeOutcome=null;

function renderMeetings(){
  const card=document.getElementById('meetings-card');
  const badge=document.getElementById('mtg-badge');
  const body=document.getElementById('mtg-body');
  if(!accountMeetings.length){card.style.display='none';return;}
  card.style.display='block';
  badge.textContent=accountMeetings.length;
  const scheduled=accountMeetings.filter(m=>m.outcome==='scheduled'||!m.outcome).length;
  if(scheduled>0){badge.style.background='rgba(0,229,255,.1)';badge.style.color='var(--neon-cyan)';}
  else{badge.style.background='rgba(57,255,20,.1)';badge.style.color='var(--neon-green)';}

  body.innerHTML=accountMeetings.map(m=>{
    const d=new Date(m.meeting_date+('T'+(m.meeting_time||'00:00'))).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const t=m.meeting_time?new Date('1970-01-01T'+m.meeting_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
    const contact=contacts.find(c=>c.id===m.contact_id);
    const contactName=contact?contact.full_name:'Unknown';
    const isScheduled=m.outcome==='scheduled'||!m.outcome;
    const outcomeLabel=(m.outcome||'scheduled').replace(/_/g,' ');
    return `<div class="mtg-row">
      <span class="mtg-date">${d}</span>
      ${t?`<span class="mtg-time">${t}</span>`:''}
      <span class="mtg-type ${m.meeting_type||'virtual'}">${m.meeting_type==='in_person'?'In Person':'Virtual'}</span>
      <span class="mtg-contact">${esc(contactName)}</span>
      <span class="mtg-outcome ${m.outcome||'scheduled'}">${outcomeLabel}</span>
      <span class="mtg-notes">${esc(m.notes||'')}</span>
      ${isScheduled?`<button class="mtg-complete-btn" onclick="showCompleteModal('${m.id}')">✓ Mark Completed</button>`:''}
    </div>`;
  }).join('');
}

function toggleMeetings(){
  const body=document.getElementById('mtg-body');
  const chev=document.getElementById('mtg-chev');
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function showCompleteModal(meetingId){
  if(document.getElementById('mtg-complete-modal')) document.getElementById('mtg-complete-modal').remove();
  _completeOutcome=null;
  const mtg=accountMeetings.find(m=>m.id===meetingId);
  if(!mtg)return;
  const contact=contacts.find(c=>c.id===mtg.contact_id);
  const contactName=contact?contact.full_name:'Unknown';
  const d=new Date(mtg.meeting_date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  const m=document.createElement('div');
  m.id='mtg-complete-modal';
  m.className='mtg-modal-overlay';
  m.innerHTML=`
  <div class="mtg-modal">
    <h2>✅ Meeting Completed</h2>
    <div class="sub">${esc(contactName)} — ${d}${mtg.meeting_type==='in_person'?' (In Person)':' (Virtual)'}</div>
    <div class="mtg-field">
      <label>Outcome</label>
      <div class="mtg-outcome-row">
        <button class="mtg-outcome-btn" data-val="positive" onclick="selectCompleteOutcome(this,'positive')">👍 Positive</button>
        <button class="mtg-outcome-btn" data-val="neutral" onclick="selectCompleteOutcome(this,'neutral')">😐 Neutral</button>
        <button class="mtg-outcome-btn" data-val="not_interested" onclick="selectCompleteOutcome(this,'not_interested')">👎 Not Interested</button>
        <button class="mtg-outcome-btn" data-val="follow_up_scheduled" onclick="selectCompleteOutcome(this,'follow_up_scheduled')">📅 Follow Up</button>
      </div>
    </div>
    <div class="mtg-field">
      <label>Discussion Notes</label>
      <textarea id="mtg-complete-notes" placeholder="What was discussed, key takeaways, action items...">${esc(mtg.notes||'')}</textarea>
    </div>
    <div class="mtg-field">
      <label>Next Step</label>
      <input id="mtg-complete-next" placeholder="e.g. Send proposal, Schedule follow-up call">
    </div>
    <div class="mtg-field">
      <label>Next Step Date</label>
      <input id="mtg-complete-next-date" type="date">
    </div>
    <button class="mtg-submit" id="mtg-complete-submit" onclick="submitComplete('${meetingId}')" disabled>Save Outcome</button>
    <button class="mtg-cancel" onclick="document.getElementById('mtg-complete-modal').remove()">Cancel</button>
  </div>`;
  m.addEventListener('click',e=>{if(e.target===m)m.remove()});

}

function selectCompleteOutcome(btn,val){
  document.querySelectorAll('#mtg-complete-modal .mtg-outcome-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  _completeOutcome=val;
  document.getElementById('mtg-complete-submit').disabled=false;
}

async function submitComplete(meetingId){
  const btn=document.getElementById('mtg-complete-submit');
  btn.disabled=true;btn.textContent='Saving...';
  const notes=document.getElementById('mtg-complete-notes').value.trim();
  const nextStep=document.getElementById('mtg-complete-next').value.trim();
  const nextStepDate=document.getElementById('mtg-complete-next-date').value||null;
  const mtg=accountMeetings.find(m=>m.id===meetingId);
  if(!mtg){btn.textContent='Error';return;}

  // 1. Update meeting record
  const {error:updateErr}=await db.from('meetings').update({
    outcome:_completeOutcome,
    notes:notes||null,
    next_step:nextStep||null,
    next_step_date:nextStepDate
  }).eq('id',meetingId);
  if(updateErr){btn.textContent='❌ '+updateErr.message;btn.disabled=false;return;}

  // 2. Update local data
  mtg.outcome=_completeOutcome;
  mtg.notes=notes||null;
  mtg.next_step=nextStep||null;
  mtg.next_step_date=nextStepDate;

  // 3. Log to activity_log
  const contact=contacts.find(c=>c.id===mtg.contact_id);
  const contactName=contact?contact.full_name:'Unknown';
  const outcomeLabels={positive:'Positive',neutral:'Neutral',not_interested:'Not Interested',follow_up_scheduled:'Follow Up Scheduled'};
  const rep=account.assigned_rep||'system';
  await db.from('activity_log').insert({
    account_id:account.id,
    contact_id:mtg.contact_id,
    event_type:'meeting_completed',
    description:`Meeting with ${contactName} completed — ${outcomeLabels[_completeOutcome]||_completeOutcome}${notes?'. '+notes.slice(0,100):''}`
  });

  // 4. Close modal, refresh UI
  document.getElementById('mtg-complete-modal').remove();
  renderMeetings();
  renderMetrics();
  renderAlert();
  // Refresh activity
  const {data:acts}=await db.from('activity_log').select('*').eq('account_id',account.id).order('created_at',{ascending:false}).limit(50);
  activity=acts||[];
  renderActivity();
}

    document.getElementById('notes-status').style.color='var(--neon-purple)';

async function saveNotes(){
  clearTimeout(notesSaveTimer);
  const val=document.getElementById('notes-area').value;
  const st=document.getElementById('notes-status');
  st.textContent='Saving…';st.style.color='var(--text3)';
  const{error}=await db.from('accounts').update({notes:val,updated_at:new Date().toISOString()}).eq('id',account.id);

  else{st.textContent='✅ Saved';st.style.color='var(--neon-green)';account.notes=val;}

}

// ─── AI SUMMARY ───
function generateSummary(){
  const el=document.getElementById('body-ai');
  el.innerHTML='<span class="ai-loading">Generating summary…</span>';
  setTimeout(()=>{el.innerHTML=`<div class="ai-text">${buildSummary()}</div>`;},100);
}

function buildSummary(){
  const a=account;
  const seqMap={};sequences.forEach(s=>{seqMap[s.contact_id]=s;});
  const total=contacts.length;
  const activeSeqs=sequences.filter(s=>s.status==='active');
  const engaged=contacts.filter(c=>c.status&&c.status!=='new');
  const champion=contacts.find(c=>c.role_type==='champion');
  const meetingSet=contacts.filter(c=>c.status==='meeting_set');
  let maxStep=0,maxName=null;
  sequences.forEach(s=>{if(s.current_step>maxStep){maxStep=s.current_step;const c=contacts.find(x=>x.id===s.contact_id);if(c)maxName=c.full_name;}});

  let lines=[];

  // Signal
  if(a.trigger_event) lines.push(`<strong>${esc(a.company)}</strong> has a live signal: ${esc(a.trigger_event)}.`);
  else lines.push(`<strong>${esc(a.company)}</strong> is in <strong>${esc(a.status)}</strong> status with ${total} contact${total!==1?'s':''}.`);

  // Meeting set
  if(meetingSet.length>0){
    lines.push(`🎯 <strong>Meeting set</strong> with ${meetingSet.map(c=>esc(c.full_name)).join(', ')}. Prep the brief — this is live.`);
    return lines.join(' ');
  }

  // Contact/sequence status
  if(total===0){
    lines.push('No contacts loaded yet — need to find 3-5 decision makers (VP/Director level) before outreach can start.');
  } else if(activeSeqs.length===0){
    lines.push(`${total} contact${total>1?'s':''} loaded but no active sequences.`);
    lines.push(`<strong>Next:</strong> Start a sequence with ${champion?esc(champion.full_name)+' (champion)':'the top contact'} — LinkedIn connect first.`);
  } else if(maxStep<=1){
    lines.push(`${activeSeqs.length} active sequence${activeSeqs.length>1?'s':''}, still in early outreach (step ${maxStep+1}/13).${maxName?' Furthest: '+esc(maxName)+'.':''}`);
    lines.push(`<strong>Next:</strong> Check if LinkedIn connections were accepted. If yes, send the opener. If not, move to email.`);
  } else if(maxStep<=5){
    lines.push(`Outreach in progress — ${activeSeqs.length} sequence${activeSeqs.length>1?'s':''} active, step ${maxStep+1}/13.${maxName?' Lead: '+esc(maxName)+'.':''} ${engaged.length>0?engaged.length+' contact'+(engaged.length>1?'s':'')+' engaged.':''}`);
    lines.push(`<strong>Next:</strong> Execute the next touchpoint and watch for replies.`);
  } else {
    lines.push(`Deep in the sequence at step ${maxStep+1}/13.${maxName?' '+esc(maxName)+' is furthest along.':''} ${engaged.length} engaged.`);
    lines.push(`<strong>Next:</strong> If no response by step 10, consider a different angle or new contacts.`);
  }

  return lines.join(' ');
}

async function startSequence(contactId){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/sequence_templates?select=id,name,description,step_count&order=step_count.desc`,{
    headers:{apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`}
  });
  const templates=await res.json();
  if(!templates.length){alert('No sequences available.');return;}
  const options=templates.map((t,i)=>`${i+1}. ${t.name} (${t.step_count} steps) — ${t.description}`).join('\n');
  const choice=prompt(`Choose a sequence:\n\n${options}\n\nEnter number:`);
  if(!choice)return;
  const template=templates[parseInt(choice)-1];
  if(!template)return;
  const rpc=await fetch(`${SUPABASE_URL}/rest/v1/rpc/start_sequence`,{
    method:'POST',
    headers:{'Content-Type':'application/json',apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`},
    body:JSON.stringify({p_contact_id:contactId,p_template_id:template.id})
  });
  const data=await rpc.json();
  if(data.sequence_id){
    alert(`✅ Started: ${template.name}\nStep 1: ${data.channel}, due ${data.due_date}`);
    loadClient();
  }else{
    alert('❌ Failed: '+(data.message||'Contact may already be in an active sequence.'));
  }
}

function filterAll(query){
  const q=query.toLowerCase();
  document.querySelectorAll('#body-contacts .ct-row').forEach(row=>{
    row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function stripPhone(p){return (p||'').replace(/[\s\-\(\)\.\+]/g,'');}

function inputStyle(){return 'width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;'}
async function submitAddContact(){
  const name=document.getElementById('ac-name').value.trim();
  const title=document.getElementById('ac-title').value.trim();
  const email=document.getElementById('ac-email').value.trim();
  const phone=document.getElementById('ac-phone').value.trim();
  const linkedin=document.getElementById('ac-linkedin').value.trim();
  const role_type=document.getElementById('ac-role').value;
  const errEl=document.getElementById('ac-err');
  const btn=document.getElementById('ac-submit');
  errEl.textContent='';
  if(!name){errEl.textContent='Name is required';return;}
  // Dupe check
  const{data:dupes}=await db.from('contacts').select('id').eq('account_id',account.id).ilike('full_name',name);
  if(dupes&&dupes.length){errEl.textContent='Contact with this name already exists on this account';return;}
  btn.disabled=true;btn.textContent='Adding...';
  const{data,error}=await db.from('contacts').insert({account_id:account.id,full_name:name,title,email:email||null,phone:phone||null,linkedin_url:linkedin||null,role_type,status:'new'}).select().single();
  if(error){errEl.textContent=error.message;btn.disabled=false;btn.textContent='Add Contact';return;}
  // Log to activity_log
  const loggedInRep=(window.currentUser&&window.currentUser.rep_name)||account.assigned_rep||'system';
  await db.from('activity_log').insert({account_id:account.id,contact_id:data.id,rep_id:loggedInRep,rep:loggedInRep,event_type:'contact_added',description:'Added contact: '+name+(title?' ('+title+')':'')+' by '+loggedInRep});
  document.getElementById('add-contact-modal').remove();
  loadContacts(account.id);
}

async function saveContactEdit(cid){
  const wrap=document.getElementById('cedit_'+cid);
  const errEl=document.getElementById('cedit_err_'+cid);
  const name=wrap.querySelector('.cedit-name').value.trim();
  const title=wrap.querySelector('.cedit-title').value.trim();
  const email=wrap.querySelector('.cedit-email').value.trim();
  const phone=wrap.querySelector('.cedit-phone').value.trim();
  const mobile=wrap.querySelector('.cedit-mobile').value.trim();
  const linkedin=wrap.querySelector('.cedit-linkedin').value.trim();
  const status=wrap.querySelector('.cedit-status').value;
  const roleType=wrap.querySelector('.cedit-role').value;
  if(!name){if(errEl){errEl.textContent='Name is required';errEl.style.display='block';}return;}
  const db=getDB();
  const update={full_name:name,title:title||null,email:email||null,phone:phone||null,mobile:mobile||null,linkedin_url:linkedin||null,status:status,role_type:roleType};
  try{
    const{error}=await db.from('contacts').update(update).eq('id',cid);
    if(error)throw error;
    // Log edit
    const loggedInRep=(window.currentUser&&window.currentUser.rep_name)||account.assigned_rep||'system';
    await db.from('activity_log').insert({account_id:account.id,contact_id:cid,rep_id:loggedInRep,rep:loggedInRep,event_type:'contact_edited',description:'Edited contact: '+name+' by '+loggedInRep});
    wrap.style.display='none';
    await loadContacts(account.id);
  }catch(e){
    console.error('[saveContactEdit] error',e);
    if(errEl){errEl.textContent=e.message||'Save failed';errEl.style.display='block';}
  }
}

async function saveAccountEdit(){
  const company=document.getElementById('ae-company').value.trim();
  const errEl=document.getElementById('ae_err');
  if(!company){if(errEl){errEl.textContent='Company name is required';errEl.style.display='block';}return;}
  const db=getDB();
  const update={
    company,
    domain:document.getElementById('ae-domain').value.trim()||null,
    city:document.getElementById('ae-city').value.trim()||null,
    status:document.getElementById('ae-status').value,
    open_roles_count:parseInt(document.getElementById('ae-open_roles_count').value)||null,
    trigger_event:document.getElementById('ae-trigger_event').value.trim()||null
  };
  try{
    const{error}=await db.from('accounts').update(update).eq('id',account.id);
    if(error)throw error;
    // Update local state
    Object.assign(account,update);
    const loggedInRep=(window.currentUser&&window.currentUser.rep_name)||account.assigned_rep||'system';
    await db.from('activity_log').insert({account_id:account.id,rep_id:loggedInRep,rep:loggedInRep,event_type:'account_edited',description:'Account edited: '+company+' by '+loggedInRep});
    document.getElementById('aedit-wrap').remove();
    renderHeader();
  }catch(e){
    console.error('[saveAccountEdit] error',e);
    if(errEl){errEl.textContent=e.message||'Save failed';errEl.style.display='block';}
  }
}
